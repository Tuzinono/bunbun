<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8" />
<title> Tuzinono </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
<div class="main-title">A&D</div>
<div class="sub-title">3D Model (AR)</div>
</header>

<!-- Avatar -->
<div class="ar-section">
<div class="head-title">Avatar</div>
<div class="sub-title">Sample From ready player.me</div>


<model-viewer id="model1"
     src="Mikasaa.glb"
     ios-src="Mikasaa.usdz"

     ar
     ar-modes="scene-viewer webxr quick-look"
     ar-scale="auto"
     ar-placement="floor"

     camera-controls
     auto-rotate

     autoplay
     animation-loop

     shadow-intensity="1"
     environment-image="neutral"

     style="width: 100%; height: 400px;">
</model-viewer>
<button class="ar-button" onclick="triggerAR('model1')">Play AR</button>
</div>

<!-- Character -->
<div class="ar-section">
<div class="head-title">bunny</div>
<div class="sub-title">cute for me</div>

<model-viewer id="model1"
     src="bunny.glb"
     ios-src="bunny.usdz"
     ar
     ar-modes="scene-viewer webxr quick-look"
     ar-scale="auto"
     ar-placement="floor"
     camera-controls
     auto-rotate
     shadow-intensity="1"
     shadow-softness="1"
     environment-image="neutral"
     loading="eager"
     reveal="auto"
     style="width: 100%; height: 400px;">
</model-viewer>

<button class="ar-button" onclick="triggerAR('model1')">Play AR</button>
</div>

<!-- room -->
<div class="ar-section">
<div class="head-title">bedroom</div>
<div class="sub-title">roommy</div>

<model-viewer id="model1"
     src="roommmmmmmy.glb"
     ios-src="roommmmmmmy.usdz"
     ar
     ar-modes="scene-viewer webxr quick-look"
     ar-scale="auto"
     ar-placement="floor"
     camera-controls
     auto-rotate
     shadow-intensity="1"
     shadow-softness="1"
     environment-image="neutral"
     loading="eager"
     reveal="auto"
     style="width: 100%; height: 400px;">
</model-viewer>

<button class="ar-button" onclick="triggerAR('model1')">Play AR</button>
</div>

<footer>
<div class="footer-link"><strong>Facebook:</strong> 
<a href="https://www.facebook.com/mushroomsstudio" target="_blank">
facebook.com/mushroomsstudio</a></div>

<div class="footer-link"><strong>Website:</strong> 
<a href="https://www.mushroom-studio.com" target="_blank">
mushroom-studio.com</a></div>
</footer>

<!-- โหลด model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- Script ปุ่ม Play AR -->
<script>
function triggerAR(id) {
  const viewer = document.getElementById(id);
  if (viewer && viewer.activateAR) {
    viewer.activateAR().catch((error) => {
      alert("AR ไม่พร้อมบนอุปกรณ์นี้ หรือถูกบล็อกโดย browser\n(แนะนำให้กดปุ่ม AR บนมุมขวาของโมเดลแทน)");
      console.warn("activateAR failed:", error);
    });
  }
}
</script>

</body>
</html>
